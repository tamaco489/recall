services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333" # REST API / Web UI (http://localhost:6333/dashboard)
      # - "6334:6334" # gRPC API — @qdrant/js-client-rest は REST のみ使用するため不要
    environment:
      - QDRANT__SERVICE__MAX_WORKERS=2
      - QDRANT__TELEMETRY_DISABLED=true
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
